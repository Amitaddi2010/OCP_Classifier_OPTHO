services:
  - type: web
    name: ophtho-ai-classifier
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask_app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
